<h1>📊 Trading AO VIVO (WebSocket)</h1>

<select id="ativo" onchange="mudarAtivo()">
    <option value="PETR4.SA">PETR4</option>
    <option value="VALE3.SA">VALE3</option>
    <option value="ITUB4.SA">ITUB4</option>
</select>

<h2 id="sinal">Aguardando...</h2>
<p id="info"></p>

<div id="grafico"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<script>

const socket = io();

// 🔥 CONEXÃO
socket.on("connect", () => {
    console.log("✅ Conectado ao servidor");
});

// 🔥 DEBUG
socket.on("dados", function(data) {

    console.log("📡 Dados recebidos:", data);

    document.getElementById("sinal").innerText = data.sinal;

    document.getElementById("info").innerText =
        "Suporte: " + data.suporte +
        " | Resistência: " + data.resistencia;

    // 🔥 segurança: evita erro se df vier vazio
    if (!data.df || data.df.length === 0) return;

    let df = data.df;

    let trace = {
        x: df.map(d => d.index),
        open: df.map(d => d.Open),
        high: df.map(d => d.High),
        low: df.map(d => d.Low),
        close: df.map(d => d.Close),
        type: 'candlestick'
    };

    Plotly.newPlot("grafico", [trace]);
});

// 🔥 troca ativo
function mudarAtivo() {
    let ativo = document.getElementById("ativo").value;
    socket.emit("set_ativo", {ativo: ativo});
}

</script>
